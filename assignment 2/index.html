<!doctype html>
<html lang=en>

  <head>
    <meta charset=utf-8>
    <script src=gulls.js></script>
    <script src=mouse.js></script>
    <script src=video.js></script>
    <style> body { margin:0 } </style> 
    <script>


// because gulls uses the await keyword, we have to wrap our
// code in an async function and call it. when we use js modules we
// don't have to do this, which is nice... but wrapping isn't that
// big of a deal.
async function run() {
    const sg = await gulls.init()

    //await Video.init()

    Mouse.init()


    // a simple vertex shader to make a quad
    const quadVertexShader = gulls.constants.vertex

    // our fragment shader, just returns blue
    const fragmentShader = `
    @group(0) @binding(0) var<uniform> res : vec2f;
    @group(0) @binding(1) var<uniform> frame: f32;
    @group(0) @binding(2) var<uniform> slider: f32;
    @group(0) @binding(3) var<uniform> mouse: vec2f;
    
    //buffer, sampler
    @group(0) @binding(4) var videoSampler: sampler;
    @group(0) @binding(5) var backBuffer: texture_2d<f32>;
    //@group(1) @binding(0) var videoBuffer: texture_external;


    @fragment
    fn fs( @builtin(position) pos : vec4f ) -> @location(0) vec4f {
        let uv = pos.xy / res;

        //let video = textureSampleBaseClampToEdge( videoBuffer, videoSampler, uv);

        let fb : vec4f = textureSample( backBuffer, videoSampler, uv);

        //var out = video * 0.05 + fb * 0.975;

        var new_uv = grid(uv, 10, 10);

        var color = vec3f(circle(new_uv, (sin(frame * 0.05) + 1) / 10   ));

        //color = color * -1 + 1;

        return vec4f(color, 1.);
    }

    fn grid(uv: vec2f, col: f32, row: f32) -> vec2f {
        var p = uv;
        p = vec2f(p.x * col, p.y * row);

        p.x += step(1., mymod(p.y, 2.0)) * 0.5;

        return fract(p);
    }

    fn mymod(x: f32, y: f32) -> f32 {
        return x - y * floor(x/y);
    }

    fn circle(uv: vec2f, radius: f32) -> f32 {
        var l: vec2f = uv - vec2f(0.5);
        return 1. - smoothstep(radius - (radius * 0.01), radius + (radius * 0.01), dot(l,l) * 4.0);
    }
    `

    // our vertex + fragment shader together
    const shader = quadVertexShader + fragmentShader

    const slider = document.querySelector('#slider')
    let slider_u = sg.uniform(slider.value)

    //shader uniforms
    let frame = sg.uniform(0)
    const mouse = sg.uniform(Mouse.values)

    //video stuff
    const back = new Float32Array(gulls.width * gulls.height * 4)
    const feedback_t = sg.texture(back)
    
    // create a render pass
    const renderPass = await sg.render({
        shader, 
        data:[
            sg.uniform([window.innerWidth, window.innerHeight]),
            frame,
            slider_u,
            mouse,
            sg.sampler(),
            feedback_t,
            //sg.video(Video.element)
        ],
        onframe() {frame.value++; mouse.value = Mouse.values},
        copy:feedback_t
        //onframe() {mouse.value = Mouse.values}
    })

    slider.oninput = ()=> slider_u.value = slider.value

    // run our render pass
    sg.run( renderPass )
}

run()


    </script>
  </head>
  
  <body>
    <canvas></canvas>
    <input 
       type=range 
       id=slider 
       min=0 max=4 
       step=any 
       style='position:absolute; left:0; top:0; z-index:1'
    /> 
  </body>
  
</html>
